<!DOCTYPE html>

<html>

<head>

<title>Create Ticket</title>


<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;

}


body{

min-height:100vh;

background:linear-gradient(135deg,#06b6d4,#2563eb);

display:flex;

justify-content:center;

align-items:center;

}



.top-link{

position:absolute;

top:30px;

right:40px;

}



.top-link a{

text-decoration:none;

background:white;

color:#2563eb;

padding:12px 25px;

border-radius:30px;

font-weight:bold;

box-shadow:0 5px 15px rgba(0,0,0,.15);

}



.ticket-box{

background:white;

width:520px;

padding:40px;

border-radius:25px;

box-shadow:0 20px 50px rgba(0,0,0,.25);

}



.logo{

text-align:center;

font-size:40px;

margin-bottom:10px;

}



h2{

text-align:center;

color:#0f172a;

font-size:30px;

margin-bottom:10px;

}



.subtitle{

text-align:center;

color:#64748b;

margin-bottom:30px;

}



label{

font-weight:600;

color:#334155;

}



input,
textarea,
select{


width:100%;

padding:14px;

margin-top:8px;

margin-bottom:20px;

border-radius:12px;

border:1px solid #cbd5e1;

font-size:15px;

outline:none;


}



input:focus,
textarea:focus,
select:focus{

border-color:#2563eb;

}



textarea{

height:120px;

resize:none;

}



button{


width:100%;

padding:15px;

border:none;

border-radius:12px;

background:linear-gradient(90deg,#2563eb,#06b6d4);

color:white;

font-size:18px;

font-weight:bold;

cursor:pointer;


}



button:hover{


transform:scale(1.02);


}



</style>


</head>



<body>



<div class="top-link">

<a href="/mytickets">

My Tickets

</a>

</div>





<div class="ticket-box">


<div class="logo">

🎫

</div>


<h2>

Create IT Ticket

</h2>



<p class="subtitle">

Report your technical issue

</p>





<form action="/save" method="post">





<label>

Name

</label>


<label>

Problem Description

</label>



<textarea

name="problem"

placeholder="Explain your issue"

required></textarea>

<button type="submit">

Submit Ticket

</button>





</form>



</div>



</body>


</html>
