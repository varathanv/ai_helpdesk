<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>IT Helpdesk Login</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  min-height: 100vh;
background: linear-gradient(135deg, #06b6d4, #3b82f6, #9333ea);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 30px;
}

/* Container */
.container {
  width: 950px;
  max-width: 100%;
  background: #fff;
  border-radius: 30px;
  overflow: hidden;
  display: flex;
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
}

/* Left Section */
.left {
  flex: 1;
  background: #fff0f5;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px;
}

.left img {
  width: 100%;
  max-width: 420px;
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
}

/* Right Section */
.right {
  width: 420px;
  padding: 50px;
  background: #fff;
}

.icon {
  text-align: center;
  font-size: 50px;
  margin-bottom: 15px;
  color: #ff758c;
}

h1 {
  text-align: center;
  color: #1e293b;
  margin-bottom: 10px;
}

.subtitle {
  text-align: center;
  color: #64748b;
  margin-bottom: 30px;
  font-size: 16px;
}

input {
  width: 100%;
  padding: 15px;
  margin-bottom: 18px;
  border: 1px solid #cbd5e1;
  border-radius: 12px;
  font-size: 16px;
  outline: none;
  transition: 0.3s;
}

input:focus {
  border-color: #ff758c;
  box-shadow: 0 0 8px rgba(255, 117, 140, 0.4);
}

button {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(90deg, #ff758c, #ffb199);
  color: white;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 12px rgba(255, 117, 140, 0.6);
}

.error {
  color: red;
  text-align: center;
  margin-bottom: 18px;
}

.register {
  margin-top: 25px;
  text-align: center;
  color: #475569;
}

.register a {
  color: #ff758c;
  text-decoration: none;
  font-weight: bold;
}

.register a:hover {
  text-decoration: underline;
}

/* Mobile */
@media (max-width: 900px) {
  .container {
    flex-direction: column;
  }
  .left {
    display: none;
  }
  .right {
    width: 100%;
  }
}
</style>
</head>

<body>
<div class="container">
  <!-- Left Image -->
  <div class="left">
    <img src="/images/login.png" alt="IT Helpdesk">
  </div>

  <!-- Right Login -->
  <div class="right">
    <div class="icon">🌸</div>
    <h1>Welcome Back</h1>
    <p class="subtitle">Login to IT Helpdesk</p>

    <p class="error" th:if="${param.error}">
      Invalid Username or Password
    </p>

    <form action="/login" method="post">
      <input type="text" name="username" placeholder="Username" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>

    <div class="register">
      Don’t have an account?
      <a href="/register">Create Account</a>
    </div>
  </div>
</div>
</body>
</html>
