<!DOCTYPE html>

<html>

<head>

<title>Create Account</title>


<style>

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;

}


body{

min-height:100vh;

background:linear-gradient(180deg,#2563EB,#aaacae);

display:flex;

justify-content:center;

align-items:center;

}



.register-box{

width:430px;

background:rgba(255,255,255,0.18);

backdrop-filter:blur(15px);

padding:40px;

border-radius:25px;

box-shadow:0 20px 50px rgba(0,0,0,.25);

color:white;

}



.icon{

text-align:center;

font-size:45px;

}



h1{

text-align:center;

margin:15px 0 30px;

}



input{

width:100%;

padding:15px;

margin-bottom:18px;

border:none;

border-radius:12px;

background:#ffffff33;

color:white;

font-size:16px;

outline:none;

}



input::placeholder{

color:white;

}



button{

width:100%;

padding:15px;

border:none;

border-radius:25px;

background:white;

color:#4f46e5;

font-size:18px;

font-weight:bold;

cursor:pointer;

}



button:hover{

transform:scale(1.03);

}



.login-link{

text-align:center;

margin-top:25px;

}



a{

color:white;

font-weight:bold;

text-decoration:none;

}


</style>


</head>


<body>



<div class="register-box">


<div class="icon">

🪪

</div>



<h1>

Create Account

</h1>




<form action="/register" method="post">



<input

type="text"

name="username"

placeholder="Username"

required>



<input

type="email"

name="email"

placeholder="Email Address"

required>



<input

type="password"

name="password"

placeholder="Password"

required>




<button type="submit">

Register

</button>



</form>




<div class="login-link">

Already have an account?

<a href="/login">

Login

</a>


</div>


</div>



</body>


</html>
